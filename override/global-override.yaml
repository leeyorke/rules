# https://mihomo.party/docs/guide/override/yaml


rule-providers:
  BilibiliHMT:
    url: https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Ruleset/BilibiliHMT.list
    path: ./ruleset/BilibiliHMT.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  Bilibili:
    url: https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Ruleset/Bilibili.list
    path: ./ruleset/Bilibili.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  ChinaMedia:
    url: https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaMedia.list
    path: ./ruleset/ChinaMedia.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  ChinaDomain:
    url: https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaDomain.list
    path: ./ruleset/ChinaDomain.list
    behavior: domain
    interval: 86400
    format: text
    type: http
  ChinaCompanyIp:
    url: https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaCompanyIp.list
    path: ./ruleset/ChinaCompanyIp.list
    behavior: ipcidr
    interval: 86400
    format: text
    type: http
  Direct:
    url: https://raw.githubusercontent.com/leeyorke/rules/refs/heads/main/rulesets/direct.list
    path: ./ruleset/Direct.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  Reject:
    url: https://raw.githubusercontent.com/leeyorke/rules/refs/heads/main/rulesets/reject.list
    path: ./ruleset/Reject.list
    behavior: classical
    interval: 86400
    format: text
    type: http

+rules:
  - "RULE-SET,Direct,DIRECT"
  - "RULE-SET,Reject,REJECT"
  - "RULE-SET,BilibiliHMT,DIRECT"
  - "RULE-SET,Bilibili,DIRECT"
  - "RULE-SET,ChinaMedia,DIRECT"
  - "RULE-SET,ChinaDomain,DIRECT"
  - "RULE-SET,ChinaCompanyIp,DIRECT"
  - "GEOIP,CN,DIRECT"
