rules:
  # > 应用分流
  - PROCESS-NAME,lync.exe,DIRECT
  - PROCESS-NAME,EXCEL.EXE,DIRECT
  - PROCESS-NAME,WINWORD.EXE,DIRECT
  - PROCESS-NAME,DIAInstaller.EXE,DIRECT
  - PROCESS-NAME,Update.exe,DIRECT
  - PROCESS-NAME,Microsoft Teams,DIRECT

  # > 小分流 Lan    - RULE-SET,Collection
  - RULE-SET,Direct,DIRECT
  - RULE-SET,Reject,REJECT
  - RULE-SET,Microsoft,微软服务
  - RULE-SET,Video,中国媒体
  - RULE-SET,Netflix,国际媒体
  - RULE-SET,Telegram,国际媒体
  - RULE-SET,YouTube,国际媒体
  - RULE-SET,Github,全球加速
  - RULE-SET,Claude,人工智能
  - RULE-SET,OpenAi,人工智能
  - RULE-SET,Grok,人工智能
  - RULE-SET,Copilot,人工智能
  - RULE-SET,InterMedia,国际媒体
  - RULE-SET,Google,国际媒体
  - RULE-SET,GoogleFCM,国际媒体
  - RULE-SET,GoogleCN,国际媒体
  - RULE-SET,Steam,全球加速
  - RULE-SET,SteamCN,全国直连


  # > 大分流
  - RULE-SET,ChinaDomain,DIRECT
  - RULE-SET,ChinaCompanyIp,DIRECT
  - RULE-SET,ChinaMedia,DIRECT

  # > 去广告REJECT
  - RULE-SET,Advertising,REJECT

  # > 单分流  - DOMAIN-SUFFIX, - DOMAIN-KEYWORD, ,no-resolve
  - GEOIP,CN,DIRECT
  - MATCH,全球加速


